name: Bug report
description: Something isn't working
title: 'bug: '
labels: ['bug']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A short, clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npm run setup`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`
      placeholder: 'v20.18.0'
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: 'macOS 14.5 / Ubuntu 22.04 / etc.'
    validations:
      required: true

  - type: dropdown
    id: llm-provider
    attributes:
      label: LLM provider
      options:
        - anthropic
        - ollama
        - other / unknown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log lines
      description: Run with `LIGHTHOUSE_DEBUG=1` and paste any non-PII lines from `~/.lighthouse/lighthouse.log`.
      render: shell
