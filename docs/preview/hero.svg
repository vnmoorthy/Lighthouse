<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f17"/>
      <stop offset="50%" stop-color="#0f1623"/>
      <stop offset="100%" stop-color="#0b0f17"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1f2937" stroke-opacity="0.3" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- center logo -->
  <g transform="translate(640, 200)">
    <circle r="56" fill="#fbbf24"/>
    <circle r="22" fill="#0b0f17"/>
    <!-- light ray -->
    <g opacity="0.4">
      <path d="M 0 -56 L -8 -180 L 8 -180 Z" fill="#fbbf24"/>
      <path d="M 0 -56 L -16 -160 L 16 -160 Z" fill="#fbbf24" opacity="0.6"/>
    </g>
  </g>

  <!-- title -->
  <text x="640" y="320" fill="#e7eef8" font-size="64" font-weight="700" text-anchor="middle" letter-spacing="-1.5">Lighthouse</text>
  <text x="640" y="360" fill="#94a3b8" font-size="20" text-anchor="middle">Self-hosted Gmail receipt &amp; subscription tracker</text>
  <text x="640" y="388" fill="#94a3b8" font-size="14" text-anchor="middle">Privacy-first &nbsp;·&nbsp; AI-powered &nbsp;·&nbsp; MIT</text>

  <!-- pill row -->
  <g transform="translate(640, 430)">
    <g transform="translate(-300, 0)">
      <rect x="-90" y="-16" width="180" height="32" rx="16" fill="#131a26" stroke="#1f2937"/>
      <circle cx="-66" cy="0" r="3" fill="#34d399"/>
      <text x="-50" y="4" fill="#e7eef8" font-size="13">Local SQLite</text>
    </g>
    <g transform="translate(-100, 0)">
      <rect x="-90" y="-16" width="180" height="32" rx="16" fill="#131a26" stroke="#1f2937"/>
      <circle cx="-66" cy="0" r="3" fill="#fbbf24"/>
      <text x="-50" y="4" fill="#e7eef8" font-size="13">Claude Haiku 4.5</text>
    </g>
    <g transform="translate(100, 0)">
      <rect x="-90" y="-16" width="180" height="32" rx="16" fill="#131a26" stroke="#1f2937"/>
      <circle cx="-66" cy="0" r="3" fill="#7dd3fc"/>
      <text x="-50" y="4" fill="#e7eef8" font-size="13">Read-only Gmail</text>
    </g>
    <g transform="translate(300, 0)">
      <rect x="-90" y="-16" width="180" height="32" rx="16" fill="#131a26" stroke="#1f2937"/>
      <circle cx="-66" cy="0" r="3" fill="#c4b5fd"/>
      <text x="-50" y="4" fill="#e7eef8" font-size="13">Ollama compatible</text>
    </g>
  </g>

  <!-- terminal preview -->
  <g transform="translate(640, 540)">
    <rect x="-300" y="-30" width="600" height="60" rx="8" fill="#0b0f17" stroke="#1f2937"/>
    <text x="-280" y="-2" fill="#94a3b8" font-size="11" font-family="JetBrains Mono, ui-monospace, monospace">$ npm run setup &amp;&amp; npm run sync &amp;&amp; npm run serve</text>
    <text x="-280" y="18" fill="#34d399" font-size="11" font-family="JetBrains Mono, ui-monospace, monospace">→ http://localhost:5174  ✓ 421 receipts · 11 subscriptions · 3 alerts</text>
  </g>
</svg>
